<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1f6b4a" />
    <title>FasoTontine hors ligne</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #fafaf9;
        color: #111827;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        max-width: 420px;
        border: 1px solid #e7e5e4;
        border-radius: 18px;
        background: white;
        padding: 28px;
        box-shadow: 0 24px 50px rgba(17, 24, 39, 0.12);
      }
      .mark {
        width: 56px;
        height: 56px;
        display: grid;
        place-items: center;
        border-radius: 14px;
        background: #1f6b4a;
        color: white;
        font-weight: 900;
      }
      h1 {
        margin: 20px 0 10px;
        font-size: 28px;
      }
      p {
        margin: 0;
        color: #57534e;
        line-height: 1.6;
      }
      a {
        margin-top: 22px;
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 10px;
        background: #1f6b4a;
        color: white;
        padding: 0 16px;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">FT</div>
      <h1>Connexion indisponible</h1>
      <p>FasoTontine reste installée sur ton téléphone. Reviens dès que la connexion revient pour synchroniser les données.</p>
      <a href="/">Réessayer</a>
    </main>
  </body>
</html>
