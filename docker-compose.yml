services:
  postgres:
    image: postgres:15-alpine
    container_name: fasotontine-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fasotontine
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./database/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/migrations/001_initial_schema.sql:ro
      - ./database/migrations/002_seed_demo_data.sql:/docker-entrypoint-initdb.d/migrations/002_seed_demo_data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d fasotontine"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
